name: Gerar APK Android (gratuito)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar build-tools e plataforma Android
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME

      - name: Gerar gradlew (wrapper)
        working-directory: twa-android
        run: |
          # Baixar Gradle 8.4 para gerar o wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.4/bin/gradle wrapper
          chmod +x gradlew
          ls -la

      - name: Criar local.properties
        working-directory: twa-android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK (debug — sem necessidade de keystore)
        working-directory: twa-android
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -100

      - name: Localizar APK gerado
        run: |
          echo "=== APKs gerados ==="
          find twa-android -name "*.apk" 2>/dev/null
          ls -lh twa-android/app/build/outputs/apk/debug/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GrupoRM-Clinica-App
          path: twa-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90
