plugins {
    id 'com.android.application'
}

android {
    namespace 'com.grupoRM.clinicacrm'
    compileSdk 34

    defaultConfig {
        applicationId "com.grupoRM.clinicacrm"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
